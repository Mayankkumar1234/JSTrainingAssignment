<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div id="main">
      <div id="nav" style="position: fixed">
        <img src="" alt="Logo" />
        <div>
          <a
            id="favourite"
            style="padding-right: 55px"
            href="./favourites.html"
          >
            Cart <span id="fav-count">0</span>
          </a>
        </div>
      </div>
      <div id="searchAndSort" style="margin-top: 65px">
        <select onchange="" name="" id="categoryList">
          <option value="">Categories</option>
        </select>
        <select name="" id="titleFilter">
          <option value="">Sort By Titlte</option>
          <option value="lth">Low to High</option>
          <option value="htl">High to Low</option>
        </select>

        <div id="inputSection">
          <input type="text" placeholder="Search Product" />
          <button>Search</button>
        </div>
      </div>
      <div id="prods"></div>
      <div id="pagination">
        <input
          style="width: 4vw; height: 6vh; padding: 3px; font-weight: 600"
          type="number"
          placeholder="prods"
          oninput="debounce()"
          id="inputPage"
        />
      </div>
    </div>
  </body>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <!-- <script src="../js/favourites.js"></script> -->
  <script src="../js/pagination.js"></script>
</html>
